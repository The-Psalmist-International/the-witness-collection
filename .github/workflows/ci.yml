name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Quality · Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

  build:
    name: Build · ${{ matrix.target }}
    needs: quality
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [staging, production]
    env:
      DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/ci
      ADMIN_SESSION_SECRET: ci-admin-session-secret-min-32-characters
      CUSTOMER_SESSION_SECRET: ci-customer-session-secret-min-32-chars
      NEXT_PUBLIC_APP_URL: ${{ matrix.target == 'production' && 'https://thewitness-collection.com' || 'https://staging.thewitness-collection.com' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: next-build-${{ matrix.target }}
          path: |
            .next
            public
          if-no-files-found: error
          retention-days: 7
